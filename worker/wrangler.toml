name = "aurelia-multipliers-worker"
main = "index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Variables are set in the dashboard or via `wrangler secret put`:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   GITHUB_PAT
#   GITHUB_OWNER
#   GITHUB_REPO
#   GITHUB_WORKFLOW   (e.g. "aurelia-cron.yml")
#   GITHUB_REF        (e.g. "main")
