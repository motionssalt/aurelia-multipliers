name: AURELIA-MULTIPLIERS — tick

# Part-1 scaffolding only. This workflow is a near-identical copy of the
# upstream aurelia cron workflow — the cycle / settle / daily summary
# routing inside runner.js will be rewritten for Multipliers in Part 2.
# Until then this file exists so the deploy scaffolding is in place; do
# not enable the schedule until Part 2 lands.

# ─────────────────────────────────────────────────────────────────────
# AURELIA is driven by an EXTERNAL cron-job.org schedule, not by GitHub
# Actions' built-in `schedule:` block. The native scheduler is unreliable
# (5–30 min jitter, silent drops during high load), which is unacceptable
# for a 15s interval trading cycle.
#
# cron-job.org POSTs to this workflow's `dispatches` endpoint every 5 min
# (cycle) and at 00:00 UTC daily (daily_summary). See SETUP.md §9 for the
# exact request bodies.
# ─────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task: cycle | manual | settle_only | daily_summary'
        required: false
        default: 'cycle'
      payload:
        description: 'JSON payload forwarded as INPUT_PAYLOAD (manual actions)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: aurelia-multipliers-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Run AURELIA tick
        env:
          # Deriv
          DERIV_BEARER_TOKEN: ${{ secrets.DERIV_BEARER_TOKEN }}
          DERIV_APP_ID:       ${{ secrets.DERIV_APP_ID }}
          DERIV_REAL_ID:      ${{ secrets.DERIV_REAL_ID }}
          DERIV_DEMO_ID:      ${{ secrets.DERIV_DEMO_ID }}
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # AI fallback providers (optional — only used when enabled in
          # config.ai.providers and the corresponding secret is set)
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          # GitHub (for worker-side; runner does not write secrets itself)
          GITHUB_PAT:         ${{ secrets.PAT_TOKEN }}
          # Task routing — defaults to 'cycle' when cron-job.org omits inputs
          INPUT_TASK:         ${{ github.event.inputs.task || 'cycle' }}
          INPUT_PAYLOAD:      ${{ github.event.inputs.payload }}
          # All repo/org secrets dumped as JSON. Runner parses out keys whose
          # name starts with GEMINI_KEY_ and exposes them in process.env so
          # ai-client.js can look them up by registry name. This is the
          # standard idiom for "arbitrary number of secrets" in Actions.
          ALL_SECRETS_JSON:   ${{ toJSON(secrets) }}
        run: |
          # Expand GEMINI_KEY_* entries from ALL_SECRETS_JSON into the
          # current shell env so node sees them as process.env[NAME].
          node -e "
            const all = JSON.parse(process.env.ALL_SECRETS_JSON || '{}');
            const lines = [];
            for (const [k, v] of Object.entries(all)) {
              if (k.startsWith('GEMINI_KEY_')) lines.push(k + '=' + v);
            }
            require('fs').writeFileSync('.gemini.env', lines.join('\n'));
          "
          set -a; [ -f .gemini.env ] && . ./.gemini.env; set +a
          rm -f .gemini.env
          node runner.js

      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "aurelia-bot"
          git config user.email "bot@aurelia"
          git add last-status.json config.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(state): tick $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push || (git pull --rebase --autostash && git push) || \
              (echo "Push failed — retrying once more" && sleep 3 && git pull --rebase --autostash && git push)
          fi
